                                <div class="row text-start">
                                    <div class="col-sm-6">
                                        <p class="mb-1"><i class="bi bi-clock-history me-2"></i> <strong>Режим работы:</strong> Пн-Пт 10:00 – 20:00</p>
                                        <p class="mb-1"><i class="bi bi-globe2 me-2"></i> <strong>Удаленная работа:</strong> по всему миру</p>
                                    </div>
                                    <div class="col-sm-6">
                                        <p class="mb-1"><i class="bi bi-file-earmark-check me-2"></i> <strong>Оформление:</strong> Договор, акты</p>
                                        <p class="mb-0"><i class="bi bi-star-fill text-warning me-2"></i> <strong>Отзывы:</strong> 50+ завершенных проектов</p>

                        </div>

        `;

        // ---- Логика переключения между резюме и услугами ----
        const container = document.getElementById('contentContainer');
        const btnResume = document.getElementById('btnResume');
        const btnServices = document.getElementById('btnServices');

        // Функция смены активной кнопки
        function setActiveButton(active) {
            if (active === 'resume') {
                btnResume.classList.remove('btn-outline-secondary');
                btnResume.classList.add('btn-primary');
                btnServices.classList.remove('btn-primary');
                btnServices.classList.add('btn-outline-secondary');
            } else {
                btnServices.classList.remove('btn-outline-secondary');
                btnServices.classList.add('btn-primary');
                btnResume.classList.remove('btn-primary');
                btnResume.classList.add('btn-outline-secondary');
            }
        }

        // Плавная смена контента
        function switchContent(type) {
            container.style.opacity = '0.5';
            setTimeout(() => {
                if (type === 'resume') {
                    container.innerHTML = resumeHTML;
                    setActiveButton('resume');
                } else {
                    container.innerHTML = servicesHTML;
                    setActiveButton('services');
                }
                container.style.opacity = '1';
            }, 150);
        }

        // Назначаем обработчики
        btnResume.addEventListener('click', () => switchContent('resume'));
        btnServices.addEventListener('click', () => switchContent('services'));

        // По умолчанию показываем резюме
        container.innerHTML = resumeHTML;
    </script>
</body>
